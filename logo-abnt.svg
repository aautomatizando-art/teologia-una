<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer thick circle -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="#1035a0" stroke-width="10"/>

  <!-- Left concentric arcs (characteristic of ABNT logo) -->
  <!-- Outer arc - left side, from ~200° to ~340° (bottom-left to top) -->
  <path d="M 38,148 A 68,68 0 1,1 38,52" fill="none" stroke="#1035a0" stroke-width="7" stroke-linecap="round"/>
  <!-- Inner arc - tighter, left side -->
  <path d="M 52,140 A 52,52 0 1,1 52,60" fill="none" stroke="#1035a0" stroke-width="5" stroke-linecap="round"/>

  <!-- Top-right sweep line -->
  <path d="M 100,8 A 92,92 0 0,1 185,65" fill="none" stroke="#1035a0" stroke-width="4" stroke-linecap="round"/>

  <!-- ABNT text -->
  <text x="108" y="123"
        font-family="'Arial Black','Arial',sans-serif"
        font-weight="900"
        font-size="58"
        text-anchor="middle"
        fill="#1035a0"
        letter-spacing="-2">ABNT</text>
</svg>
