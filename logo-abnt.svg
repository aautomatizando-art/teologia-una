<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#1a3fa8" stroke-width="7"/>
  <!-- Inner decorative ring (partial arc top-left) -->
  <path d="M 22,100 A 78,78 0 0,1 178,100" fill="none" stroke="#1a3fa8" stroke-width="4" stroke-linecap="round"/>
  <path d="M 10,100 A 90,90 0 0,1 190,100" fill="none" stroke="#1a3fa8" stroke-width="2.5" stroke-linecap="round"/>
  <!-- ABNT letters -->
  <text x="100" y="125"
        font-family="'Arial Black','Arial',sans-serif"
        font-weight="900"
        font-size="62"
        text-anchor="middle"
        fill="#1a3fa8"
        letter-spacing="-1">ABNT</text>
  <!-- Sweep arc bottom-right decorative -->
  <path d="M 30,145 A 85,85 0 0,0 170,145" fill="none" stroke="#1a3fa8" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
</svg>
